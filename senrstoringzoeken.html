let currentItem = 0;

function escapeHTML(text){return String(text).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
function fillSelect(){document.getElementById("itemSelect").innerHTML=items.map((item,i)=>`<option value="${i}">${escapeHTML(item.title)}</option>`).join("");}

function loadSection(index){document.querySelectorAll("#stepMenu button").forEach((b,i)=>b.classList.toggle("active",i===index));const item=items[currentItem];const s=item.sections[index];let html=`<span class="pill">${escapeHTML(item.title.split(" - ")[0])}</span><h2>${escapeHTML(s.title)}</h2>`;
if(s.kind==="txt"){html+=`<div class="txtbox">${escapeHTML(s.txt)}</div><button class="action-btn" onclick="downloadTxt('${item.id}')">Download storing als txt</button>`;}
else if(s.kind==="solution"){html+=`<p>Typ hier je oplossing. Deze tekst blijft op deze computer bewaard zolang de browsergegevens niet worden gewist.</p><textarea class="solution" id="solution-${s.solutionId}" placeholder="Oorzaak, oplossing, gebruikte stappen en screenshots..."></textarea><button class="action-btn" onclick="saveSolution('${s.solutionId}')">Oplossing bewaren</button>`;}
else if(s.kind==="steps"){html+=`<ul>`+s.items.map(line=>`<li>${escapeHTML(line)}</li>`).join("")+`</ul>`;}
else {const arr=s.items||[];arr.forEach((line,i)=>{html+= i<2 ? `<p>${escapeHTML(line)}</p>` : (i===2?`<ul><li>${escapeHTML(line)}</li>`:`<li>${escapeHTML(line)}</li>`);}); if(arr.length>2) html+=`</ul>`;}
if(s.menuLabel==="Bewijs"||s.menuLabel==="Portfolio"||s.menuLabel==="Inleveren"){html+=`<div class="note"><strong>Let op:</strong> zet je bestand met screenshots in je portfolio.</div>`;}
document.getElementById("content").innerHTML=html;if(s.kind==="solution"){const t=document.getElementById("solution-"+s.solutionId);const saved=localStorage.getItem("storingzoeken-"+s.solutionId);if(t&&saved)t.value=saved;}}
function saveSolution(id){const t=document.getElementById("solution-"+id);if(!t)return;localStorage.setItem("storingzoeken-"+id,t.value);alert("Oplossing bewaard op deze computer.");}
function downloadTxt(id){const item=items.find(x=>x.id===id);if(!item)return;const sec=item.sections.find(s=>s.kind==="txt");if(!sec)return;const blob=new Blob([sec.txt],{type:"text/plain;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=id+".txt";document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);}
fillSelect();loadItem(0);
</script>
</body>
