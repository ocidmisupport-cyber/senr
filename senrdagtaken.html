<script>
const TASKS = [{"code": "P3.01", "title": "Windows Server 2022 Datacenter installeren", "steps": [{"label": "Start opdracht", "title": "Start opdracht", "html": "<p><strong>P3.01 · Windows Server 2022 Datacenter installeren</strong></p>\n<p>Je installeert Windows Server 2022 Datacenter voor de serveromgeving van S&amp;R Trucks.</p>\n<p>Werk stap voor stap, noteer je keuzes en controleer na afloop of de server correct opstart.</p>\n<div class=\"info\"><strong>Doel:</strong> een werkende Windows Server 2022 Datacenter-installatie opleveren.</div>"}, {"label": "Wat leer je?", "title": "Wat ga je leren?", "html": "<ul class=\"compact-list\">\n  <li>Minimale systeemvereisten controleren.</li>\n  <li>Een opstartbaar installatiemedium maken.</li>\n  <li>Windows Server 2022 Datacenter installeren.</li>\n  <li>Basisinstellingen zoals naam, wachtwoord en netwerk controleren.</li>\n</ul>"}, {"label": "Systeem controleren", "title": "Stap 1: voorbereiding", "html": "<p>Controleer eerst of de server geschikt is voor Windows Server 2022 Datacenter.</p>\n<ul class=\"compact-list\">\n  <li>Controleer processor, geheugen, opslag en netwerk.</li>\n  <li>Zorg dat je een computer hebt om een USB-installatiemedium te maken.</li>\n  <li>Controleer of je alle benodigde gegevens en toegang hebt.</li>\n</ul>"}, {"label": "ISO downloaden", "title": "Stap 2: installatiebestand downloaden", "html": "<p>Download het ISO-installatiebestand van Windows Server 2022 Datacenter.</p>\n<ul class=\"compact-list\">\n  <li>Gebruik de officiële Microsoft-omgeving, bijvoorbeeld via <strong>portal.azure.com</strong>.</li>\n  <li>Zoek Windows Server 2022 Datacenter.</li>\n  <li>Bewaar het ISO-bestand op een plek waar je het terugvindt.</li>\n</ul>"}, {"label": "USB-stick maken", "title": "Stap 3: opstartbare USB-stick maken", "html": "<p>Maak met een tool zoals Rufus een opstartbare USB-stick.</p>\n<ul class=\"compact-list\">\n  <li>Selecteer het gedownloade ISO-bestand.</li>\n  <li>Kies passende instellingen, zoals <strong>GPT</strong> en <strong>UEFI</strong>.</li>\n  <li>Controleer goed dat je de juiste USB-stick gebruikt.</li>\n</ul>"}, {"label": "Installatie starten", "title": "Stap 4: installatie starten", "html": "<p>Start de server op vanaf de USB-stick.</p>\n<ul class=\"compact-list\">\n  <li>Plaats de USB-stick en herstart de server.</li>\n  <li>Open het bootmenu met bijvoorbeeld F12 of Esc.</li>\n  <li>Kies de USB-stick als opstartmedium.</li>\n  <li>Selecteer taal, tijdzone en toetsenbordindeling.</li>\n</ul>"}, {"label": "Sleutel en licentie", "title": "Stap 5 en 6: sleutel en licentie", "html": "<p>Doorloop de licentie- en productsleutelstappen zorgvuldig.</p>\n<ul class=\"compact-list\">\n  <li>Voer de productsleutel in als daarom wordt gevraagd.</li>\n  <li>Lees en accepteer de licentievoorwaarden.</li>\n  <li>Ga pas verder wanneer je zeker weet dat je de juiste editie installeert.</li>\n</ul>"}, {"label": "Schijf kiezen", "title": "Stap 7: installatietype en schijf", "html": "<p>Kies voor een schone installatie.</p>\n<ul class=\"compact-list\">\n  <li>Kies <strong>Custom: Install Windows only</strong>.</li>\n  <li>Selecteer de juiste doelschijf.</li>\n  <li>Verwijder oude partities alleen als dit volgens de opdracht mag.</li>\n</ul>"}, {"label": "Installatie wachten", "title": "Stap 8: installatie afwachten", "html": "<p>De installatie duurt enkele minuten en de server start automatisch meerdere keren opnieuw op.</p>\n<div class=\"note\"><strong>Let op:</strong> onderbreek de installatie niet en verwijder de USB-stick pas wanneer dat veilig kan.</div>"}, {"label": "Server instellen", "title": "Stap 9 en 10: Windows Server configureren", "html": "<p>Na de installatie voer je de eerste instellingen in.</p>\n<ul class=\"compact-list\">\n  <li>Kies de juiste Windows-editie: <strong>Datacenter Edition</strong>.</li>\n  <li>Stel een sterke Administrator-wachtwoord in.</li>\n  <li>Kies een duidelijke computernaam.</li>\n  <li>Controleer de netwerkinstellingen.</li>\n</ul>"}, {"label": "Afronden", "title": "Stap 11: afronden en controleren", "html": "<p>Log in met het Administrator-account en controleer de installatie.</p>\n<ul class=\"compact-list\">\n  <li>Controleer of Windows Server correct is gestart.</li>\n  <li>Bekijk de basisinstellingen.</li>\n  <li>Voer updates en beveiligingspatches uit als je docent dit aangeeft.</li>\n</ul>"}, {"label": "Portfolio-bewijs", "title": "Portfolio-bewijs", "html": "<p>Bewaar tijdens het werken bewijs voor je portfolio. Kies bewijs dat laat zien wat je hebt ingesteld en getest.</p>\n<ul class=\"compact-list two-col\">\n  <li>Schermafbeelding van belangrijke instellingen.</li>\n  <li>Korte uitleg van je keuzes.</li>\n  <li>Testresultaat of controle door docent.</li>\n  <li>Reflectie: wat ging goed en wat wil je verbeteren?</li>\n</ul>\n<div class=\"note\"><strong>Let op:</strong> gebruik veilige wachtwoorden en pas geen instellingen buiten de opdracht aan zonder overleg.</div>"}]}, {"code": "P3.02", "title": "Windows Server 2022 configureren", "steps": [{"label": "Start opdracht", "title": "Start opdracht", "html": "<p><strong>P3.02 · Windows Server 2022 configureren</strong></p>\n<p>Je configureert de server na installatie. Je stelt de computernaam in, past de netwerkkaarten aan en installeert Google Chrome.</p>\n<div class=\"info\"><strong>Doel:</strong> de server herkenbaar maken in het netwerk en klaarzetten voor vervolgopdrachten.</div>"}, {"label": "Wat leer je?", "title": "Wat ga je leren?", "html": "<ul class=\"compact-list\">\n  <li>De computernaam instellen volgens afspraak.</li>\n  <li>Eén netwerkkaart op DHCP laten staan.</li>\n  <li>Een tweede netwerkkaart een statisch IP-adres geven.</li>\n  <li>Google Chrome installeren en testen.</li>\n</ul>"}, {"label": "Computernaam", "title": "Stap 1: computernaam instellen", "html": "<p>Geef de server een duidelijke naam.</p>\n<ul class=\"compact-list\">\n  <li>Log in als Administrator.</li>\n  <li>Open <strong>Instellingen → Systeem → Over</strong>.</li>\n  <li>Kies <strong>Naam van deze pc wijzigen</strong>.</li>\n  <li>Gebruik: <strong>server-&lt;studentnummer&gt;</strong> en herstart.</li>\n</ul>"}, {"label": "Netwerkkaarten", "title": "Stap 2: netwerk controleren", "html": "<p>Open het Netwerkcentrum en bekijk de adapterinstellingen.</p>\n<ul class=\"compact-list\">\n  <li>Controleer dat je twee netwerkkaarten ziet.</li>\n  <li>Kaart 1 blijft verbonden met de switch en staat op DHCP.</li>\n  <li>Kaart 2 krijgt een statisch IP-adres.</li>\n</ul>"}, {"label": "Statisch IP", "title": "Stap 2: statisch IP instellen", "html": "<p>Stel IPv4 in op netwerkkaart 2.</p>\n<ul class=\"compact-list\">\n  <li><strong>IP-adres:</strong> 192.168.1.1</li>\n  <li><strong>Subnetmasker:</strong> 255.255.255.0</li>\n  <li><strong>Standaardgateway:</strong> zoek deze zelf uit.</li>\n  <li>Klik op OK en sluit de vensters.</li>\n</ul>"}, {"label": "Chrome installeren", "title": "Stap 3: Google Chrome installeren", "html": "<p>Installeer Google Chrome op de server.</p>\n<ul class=\"compact-list\">\n  <li>Open Microsoft Edge of een andere browser.</li>\n  <li>Ga naar de officiële Chrome-downloadpagina.</li>\n  <li>Download de Windows-versie en volg de installatiestappen.</li>\n</ul>"}, {"label": "Controle", "title": "Controle en test", "html": "<p>Controleer of de configuratie werkt.</p>\n<ul class=\"compact-list\">\n  <li>Controleer de servernaam na de herstart.</li>\n  <li>Controleer de IP-instellingen van beide netwerkkaarten.</li>\n  <li>Start Google Chrome en controleer of de browser werkt.</li>\n</ul>"}, {"label": "Portfolio-bewijs", "title": "Portfolio-bewijs", "html": "<p>Bewaar tijdens het werken bewijs voor je portfolio. Kies bewijs dat laat zien wat je hebt ingesteld en getest.</p>\n<ul class=\"compact-list two-col\">\n  <li>Schermafbeelding van belangrijke instellingen.</li>\n  <li>Korte uitleg van je keuzes.</li>\n  <li>Testresultaat of controle door docent.</li>\n  <li>Reflectie: wat ging goed en wat wil je verbeteren?</li>\n</ul>\n<div class=\"note\"><strong>Let op:</strong> gebruik veilige wachtwoorden en pas geen instellingen buiten de opdracht aan zonder overleg.</div>"}]}, {"code": "P3.03", "title": "DHCP-server installeren en configureren", "steps": [{"label": "Start opdracht", "title": "Start opdracht", "html": "<p><strong>P3.03 · DHCP-server installeren en configureren</strong></p>\n<p>Je installeert en configureert een DHCP-server op Windows Server 2022. Apparaten in het netwerk moeten automatisch een IP-adres krijgen.</p>\n<div class=\"info\"><strong>Doel:</strong> DHCP laten werken op netwerkkaart 2 met een eigen IP-bereik.</div>"}, {"label": "Wat leer je?", "title": "Wat ga je leren?", "html": "<ul class=\"compact-list\">\n  <li>De DHCP Server-rol installeren.</li>\n  <li>Een DHCP-scope maken.</li>\n  <li>Een IP-bereik instellen vanaf 192.168.1.100.</li>\n  <li>DHCP koppelen aan netwerkkaart 2.</li>\n</ul>"}, {"label": "Rol installeren", "title": "Stap 1: DHCP-serverrol installeren", "html": "<p>Installeer de DHCP Server-rol via Server Manager.</p>\n<ul class=\"compact-list\">\n  <li>Open <strong>Server Manager</strong>.</li>\n  <li>Kies <strong>Beheren → Rollen en functies toevoegen</strong>.</li>\n  <li>Vink <strong>DHCP Server</strong> aan.</li>\n  <li>Doorloop de wizard en start de installatie.</li>\n</ul>"}, {"label": "DHCP openen", "title": "Stap 2: DHCP openen", "html": "<p>Open na de installatie de DHCP-beheeromgeving.</p>\n<ul class=\"compact-list\">\n  <li>Ga in Server Manager naar <strong>DHCP</strong>.</li>\n  <li>Selecteer de server.</li>\n  <li>Open <strong>IPv4</strong>.</li>\n</ul>"}, {"label": "Scope maken", "title": "Stap 2: nieuwe scope maken", "html": "<p>Maak een nieuwe DHCP-scope aan.</p>\n<ul class=\"compact-list\">\n  <li>Klik met rechts op IPv4 en kies <strong>Nieuwe scope</strong>.</li>\n  <li>Geef de scope een naam, bijvoorbeeld <strong>LAN-Scope</strong>.</li>\n  <li>Stel een leaseperiode in, bijvoorbeeld standaard 8 dagen.</li>\n</ul>"}, {"label": "IP-bereik", "title": "Stap 2: IP-bereik instellen", "html": "<p>Gebruik het bereik uit de opdracht.</p>\n<ul class=\"compact-list\">\n  <li><strong>Start-IP:</strong> 192.168.1.100</li>\n  <li><strong>Eind-IP:</strong> 192.168.1.199</li>\n  <li><strong>Subnetmasker:</strong> 255.255.255.0</li>\n  <li>Activeer de scope na het configureren.</li>\n</ul>"}, {"label": "DHCP-opties", "title": "Stap 2: DHCP-opties invullen", "html": "<p>Vul de benodigde DHCP-opties in.</p>\n<ul class=\"compact-list\">\n  <li>Vul bij gateway het juiste adres in; zoek dit zelf uit.</li>\n  <li>Vul bij DNS-server het serveradres of een passende DNS-server in.</li>\n  <li>Controleer alle gegevens voordat je afrondt.</li>\n</ul>"}, {"label": "Koppelen kaart 2", "title": "Stap 3: DHCP koppelen aan netwerkkaart 2", "html": "<p>Controleer dat DHCP op de juiste netwerkinterface actief is.</p>\n<ul class=\"compact-list\">\n  <li>Open de eigenschappen van de DHCP-server.</li>\n  <li>Controleer of netwerkkaart 2 met <strong>192.168.1.1</strong> geselecteerd is.</li>\n  <li>Herstart eventueel de DHCP Server-service via <strong>services.msc</strong>.</li>\n</ul>"}, {"label": "Testen", "title": "Testen en controleren", "html": "<p>Test of apparaten automatisch een adres krijgen.</p>\n<ul class=\"compact-list\">\n  <li>Sluit een apparaat aan op het juiste netwerk.</li>\n  <li>Controleer of het een adres krijgt tussen 192.168.1.100 en 192.168.1.199.</li>\n  <li>Maak een screenshot van de scope of lease.</li>\n</ul>"}, {"label": "Portfolio-bewijs", "title": "Portfolio-bewijs", "html": "<p>Bewaar tijdens het werken bewijs voor je portfolio. Kies bewijs dat laat zien wat je hebt ingesteld en getest.</p>\n<ul class=\"compact-list two-col\">\n  <li>Schermafbeelding van belangrijke instellingen.</li>\n  <li>Korte uitleg van je keuzes.</li>\n  <li>Testresultaat of controle door docent.</li>\n  <li>Reflectie: wat ging goed en wat wil je verbeteren?</li>\n</ul>\n<div class=\"note\"><strong>Let op:</strong> gebruik veilige wachtwoorden en pas geen instellingen buiten de opdracht aan zonder overleg.</div>"}]}, {"code": "P3.04", "title": "Serverrollen configureren op Windows Server 2022", "steps": [{"label": "Start opdracht", "title": "Start opdracht", "html": "<p><strong>P3.04 · Serverrollen configureren op Windows Server 2022</strong></p>\n<p>Je kiest serverrollen, maakt eerst een plan en voert daarna de installatie, configuratie en controle uit.</p>\n<div class=\"info\"><strong>Belangrijk:</strong> laat je plan controleren door de docent voordat je serverrollen installeert.</div>"}, {"label": "Wat leer je?", "title": "Wat ga je leren?", "html": "<ul class=\"compact-list\">\n  <li>Een plan maken voor serverrollen.</li>\n  <li>Rollen installeren via Server Manager.</li>\n  <li>Rollen configureren voor een praktijksituatie.</li>\n  <li>Controleren of rollen correct functioneren.</li>\n</ul>"}, {"label": "Plan maken", "title": "Stap 1: plan maken", "html": "<p>Maak vooraf een kort plan.</p>\n<ul class=\"compact-list\">\n  <li>Welke rollen heb je nodig?</li>\n  <li>Waarom kies je deze rollen?</li>\n  <li>Welke instellingen moet je configureren?</li>\n  <li>Welke test gebruik je om werking aan te tonen?</li>\n</ul>"}, {"label": "Docentcheck", "title": "Plan laten controleren", "html": "<p>Laat je plan controleren voordat je verdergaat.</p>\n<div class=\"note\"><strong>Niet overslaan:</strong> serverrollen kunnen grote gevolgen hebben voor de serveromgeving. Begin pas met installeren na akkoord.</div>"}, {"label": "Rollen installeren", "title": "Stap 2: serverrollen installeren", "html": "<p>Installeer de gekozen rollen via Server Manager.</p>\n<ul class=\"compact-list\">\n  <li>Open <strong>Beheren → Rollen en functies toevoegen</strong>.</li>\n  <li>Kies de juiste server.</li>\n  <li>Vink de rollen uit je plan aan.</li>\n  <li>Controleer extra functies en start de installatie.</li>\n</ul>"}, {"label": "AD DS", "title": "Stap 3: Active Directory configureren", "html": "<p>Als je AD DS kiest, configureer je een nieuw domein.</p>\n<ul class=\"compact-list\">\n  <li>Open Server Manager → AD DS.</li>\n  <li>Configureer een domein, bijvoorbeeld <strong>mijnbedrijf.local</strong>.</li>\n  <li>Stel het DSRM-wachtwoord in.</li>\n  <li>Herstart wanneer de wizard dit vraagt.</li>\n</ul>"}, {"label": "DNS", "title": "Stap 3: DNS configureren", "html": "<p>Als je DNS installeert, richt je de DNS Manager in.</p>\n<ul class=\"compact-list\">\n  <li>Maak een <strong>Forward Lookup Zone</strong>.</li>\n  <li>Voeg waar nodig A-records toe.</li>\n  <li>Voeg CNAME-records toe als dit past bij je plan.</li>\n</ul>"}, {"label": "Bestanden", "title": "Stap 3: File and Storage Services", "html": "<p>Als je bestandsdiensten kiest, maak je een gedeelde map.</p>\n<ul class=\"compact-list\">\n  <li>Open File and Storage Services.</li>\n  <li>Maak een gedeelde map.</li>\n  <li>Stel toegangsrechten zorgvuldig in.</li>\n</ul>"}, {"label": "Hyper-V / RDP", "title": "Stap 3: Hyper-V of Remote Desktop", "html": "<p>Configureer de gekozen virtualisatie- of toegangsdienst.</p>\n<ul class=\"compact-list\">\n  <li>Bij Hyper-V: maak een virtuele switch en controleer VM-instellingen.</li>\n  <li>Bij Remote Desktop: activeer extern bureaublad.</li>\n  <li>Voeg alleen gebruikers toe die toegang mogen krijgen.</li>\n</ul>"}, {"label": "Test rollen", "title": "Stap 4: testen en controleren", "html": "<p>Controleer of de rollen werken.</p>\n<ul class=\"compact-list\">\n  <li>Bekijk Event Viewer op foutmeldingen.</li>\n  <li>Test DNS bijvoorbeeld met <strong>nslookup</strong>.</li>\n  <li>Controleer AD DS bijvoorbeeld met <strong>rsop.msc</strong>.</li>\n  <li>Test netwerktoegang of externe verbindingen.</li>\n</ul>"}, {"label": "Docentcontrole", "title": "Resultaat laten controleren", "html": "<p>Als alles werkt, meld je dit bij de docent.</p>\n<ul class=\"compact-list\">\n  <li>Laat zien welke rollen je hebt geïnstalleerd.</li>\n  <li>Leg uit waarom je deze rollen koos.</li>\n  <li>Toon je testresultaten.</li>\n</ul>"}, {"label": "Portfolio-bewijs", "title": "Portfolio-bewijs", "html": "<p>Bewaar tijdens het werken bewijs voor je portfolio. Kies bewijs dat laat zien wat je hebt ingesteld en getest.</p>\n<ul class=\"compact-list two-col\">\n  <li>Schermafbeelding van belangrijke instellingen.</li>\n  <li>Korte uitleg van je keuzes.</li>\n  <li>Testresultaat of controle door docent.</li>\n  <li>Reflectie: wat ging goed en wat wil je verbeteren?</li>\n</ul>\n<div class=\"note\"><strong>Let op:</strong> gebruik veilige wachtwoorden en pas geen instellingen buiten de opdracht aan zonder overleg.</div>"}]}, {"code": "P3.05", "title": "Spanned en striped volumes maken", "steps": [{"label": "Start opdracht", "title": "Start opdracht", "html": "<p><strong>P3.05 · Spanned en striped volumes maken in Windows Server 2022</strong></p>\n<p>Je maakt twee soorten volumes in Windows Server 2022: een spanned volume en een striped volume.</p>\n<div class=\"info\"><strong>Doel:</strong> leren hoe opslag over meerdere schijven kan worden verdeeld.</div>"}, {"label": "Voorbereiding", "title": "Voorbereiding", "html": "<p>Zorg dat je minimaal twee fysieke of virtuele schijven hebt die nog niet gealloceerd zijn.</p>\n<ul class=\"compact-list\">\n  <li>Open Server Manager → File and Storage Services → Disks.</li>\n  <li>Controleer of de schijven zichtbaar zijn.</li>\n  <li>Open Disk Management via Win + X of <strong>diskmgmt.msc</strong>.</li>\n</ul>"}, {"label": "Spanned uitleg", "title": "Spanned volume: wat is het?", "html": "<p>Een spanned volume combineert meerdere schijven tot één logisch volume.</p>\n<ul class=\"compact-list\">\n  <li>De opslagruimte wordt achtereenvolgens gebruikt.</li>\n  <li>Het vergroot vooral de capaciteit.</li>\n  <li>Het geeft geen prestatieverbetering en geen fouttolerantie.</li>\n</ul>"}, {"label": "Spanned maken", "title": "Spanned volume maken", "html": "<p>Maak een spanned volume via Disk Management.</p>\n<ul class=\"compact-list\">\n  <li>Klik rechts op niet-gealloceerde ruimte.</li>\n  <li>Kies <strong>New Spanned Volume</strong>.</li>\n  <li>Voeg extra schijven toe met <strong>Add</strong>.</li>\n  <li>Kies stationsletter, bestandssysteem en volumenaam.</li>\n</ul>"}, {"label": "Striped uitleg", "title": "Striped volume: wat is het?", "html": "<p>Een striped volume verdeelt data over meerdere schijven.</p>\n<ul class=\"compact-list\">\n  <li>Dit heet ook RAID 0.</li>\n  <li>Het kan sneller zijn dan één losse schijf.</li>\n  <li>Als één schijf faalt, gaat alle data verloren.</li>\n</ul>"}, {"label": "Striped maken", "title": "Striped volume maken", "html": "<p>Maak een striped volume via Disk Management.</p>\n<ul class=\"compact-list\">\n  <li>Klik rechts op niet-gealloceerde ruimte.</li>\n  <li>Kies <strong>New Striped Volume</strong>.</li>\n  <li>Voeg extra schijven toe met <strong>Add</strong>.</li>\n  <li>Kies stationsletter, bestandssysteem en volumenaam.</li>\n</ul>"}, {"label": "Waarschuwing", "title": "Waarschuwing dynamische schijven", "html": "<p>Windows kan vragen om schijven om te zetten naar dynamische schijven.</p>\n<div class=\"note\"><strong>Controleer eerst:</strong> bevestig dit alleen als het binnen de opdracht past en je docent dit toestaat.</div>"}, {"label": "Controleren", "title": "Resultaat controleren", "html": "<p>Controleer of beide volumes zichtbaar en bruikbaar zijn.</p>\n<ul class=\"compact-list\">\n  <li>Bekijk de volumes in Disk Management.</li>\n  <li>Controleer of ze zichtbaar zijn in Verkenner.</li>\n  <li>Maak een korte testmap of testbestand als controle.</li>\n</ul>"}, {"label": "Extra tips", "title": "Extra tips", "html": "<ul class=\"compact-list\">\n  <li>Spanned volumes zijn handig voor meer opslagruimte.</li>\n  <li>Striped volumes zijn gericht op prestaties, niet op veiligheid.</li>\n  <li>Gebruik mirrored of RAID 5 als gegevensbescherming belangrijk is.</li>\n</ul>"}, {"label": "Portfolio-bewijs", "title": "Portfolio-bewijs", "html": "<p>Bewaar tijdens het werken bewijs voor je portfolio. Kies bewijs dat laat zien wat je hebt ingesteld en getest.</p>\n<ul class=\"compact-list two-col\">\n  <li>Schermafbeelding van belangrijke instellingen.</li>\n  <li>Korte uitleg van je keuzes.</li>\n  <li>Testresultaat of controle door docent.</li>\n  <li>Reflectie: wat ging goed en wat wil je verbeteren?</li>\n</ul>\n<div class=\"note\"><strong>Let op:</strong> gebruik veilige wachtwoorden en pas geen instellingen buiten de opdracht aan zonder overleg.</div>"}]}];
let currentTask = 0;
let currentStep = 0;

function renderTaskOptions() {
  const select = document.getElementById('taskSelect');
  select.innerHTML = TASKS.map((task, index) =>
    `<option value="${index}">${task.code} - ${escapeHtml(task.title)}</option>`
  ).join('');
  select.addEventListener('change', function() {
    currentTask = Number(this.value);
    currentStep = 0;
    renderStepMenu();
    renderContent();
  });
}

function renderStepMenu() {
  const menu = document.getElementById('stepMenu');
  const task = TASKS[currentTask];
  menu.innerHTML = task.steps.map((step, index) =>
    `<button class="tab-button ${index === currentStep ? 'active' : ''}" onclick="openStep(${index})">${escapeHtml(step.label)}</button>`
  ).join('');
}

function renderContent() {
  const task = TASKS[currentTask];
  const step = task.steps[currentStep];
  document.getElementById('contentArea').innerHTML = `<h2>${escapeHtml(step.title)}</h2>${step.html}`;
}

function openStep(index) {
  currentStep = index;
  renderStepMenu();
  renderContent();
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

renderTaskOptions();
renderStepMenu();
renderContent();
</script>
</body>
</html>
